<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>AMA Service Points — Zone Rings</title>

<style>
  :root{--bg:#f4f6f8;--panel:#ffffff;--line:#d7dde3;--txt:#1b2127;--mut:#5c6773;--red:#e02d3c;--grn:#1a9850;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;}
  #map{position:absolute;top:0;left:0;right:0;bottom:0;}
  .leaflet-container{background:#dfe6ec;}
  #panel{position:absolute;top:12px;left:12px;z-index:1000;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 16px;width:252px;box-shadow:0 6px 20px rgba(0,0,0,.18);max-height:92vh;overflow:auto;}
  #panel h1{font-size:13px;margin:0 0 2px;letter-spacing:.5px;}
  #panel .sub{font-size:10px;color:var(--mut);margin-bottom:10px;}
  .row{display:flex;align-items:center;gap:9px;font-size:12px;margin:5px 0;cursor:pointer;user-select:none;}
  .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto;border:1.5px solid #333;}
  .cnt{margin-left:auto;color:var(--mut);font-size:11px;}
  .lab{font-size:10px;color:var(--mut);letter-spacing:.5px;margin:11px 0 5px;text-transform:uppercase;display:flex;justify-content:space-between;}
  .lab a{color:var(--mut);text-decoration:underline;cursor:pointer;text-transform:none;}
  .zr{display:flex;align-items:center;gap:8px;font-size:11px;cursor:pointer;user-select:none;margin:3px 0;}
  .zr.off{opacity:.3;}
  .sw{width:16px;height:0;border-top:3px solid #333;flex:0 0 auto;border-radius:2px;}
  .zr .c{margin-left:auto;color:var(--mut);}
  .zr .mi{color:var(--mut);font-size:10px;}
  #prog{margin-top:11px;font-size:10px;color:var(--mut);}
  #bar{height:4px;background:#e3e8ec;border-radius:3px;margin-top:5px;overflow:hidden;}
  #bar>div{height:100%;width:0;background:var(--grn);transition:width .2s;}
  .ringlbl{font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.55);padding:1px 5px;border-radius:4px;white-space:nowrap;border:1px solid rgba(255,255,255,.4);}
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:7px;font-family:inherit;}
  .pp b{font-size:13px;} .pp span{color:var(--mut);font-size:11px;}
  .pp .tag{display:inline-block;margin-top:5px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
  .pp .tag.red{background:rgba(224,45,60,.15);color:var(--red);}
  .pp .tag.grn{background:rgba(26,152,80,.15);color:var(--grn);}
</style>
</head>

const QCOL={0:'#1a9850',1:'#e02d3c'};
const WAREHOUSE=[35.2819955,-101.8348046]; // 7301 Dumas Dr, Amarillo TX 79108
// zone ring def: outer-edge driving mile + clean(concentric) flag + color
const ZRING=[
 ['A',15,true,'#1a9850'],['B',30,true,'#66bd63'],['C',45,true,'#a6d96a'],
 ['D',60,true,'#d9b400'],['E',75,true,'#fdae61'],['F',90,true,'#f46d43'],
 ['G',120,true,'#e34a33'],['H',115,false,'#cb181d'],['I',135,false,'#99000d'],
 ['Z',155,false,'#6a1b9a']];
const ZCOUNT={}; POINTS.forEach(p=>ZCOUNT[p[4]]=(ZCOUNT[p[4]]||0)+1);
const ROAD=1.2; // driving->straight-line shrink so rings hug the dots
const MI=1609.34;

const map=L.map('map',{zoomControl:true}).setView(WAREHOUSE,7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

const ptLayer=L.layerGroup().addTo(map);
const ringLayers={};
const bounds=[]; let done=0; let origin=null;

function buildRings(lat,lon){
  origin=[lat,lon];
  ZRING.forEach(([z,mi,clean,col])=>{
    const g=L.layerGroup();
    const rMeters=(mi/ROAD)*MI;
    L.circle([lat,lon],{radius:rMeters,color:col,weight:2.5,
      dashArray:clean?null:'7 6',fill:false,opacity:.95}).addTo(g);
    // label at north edge of ring
    const dLat=(mi/ROAD)/69.0;
    L.marker([lat+dLat,lon],{icon:L.divIcon({className:'',
      html:'<span class="ringlbl" style="background:'+col+'">'+z+' · '+mi+'mi</span>',
      iconSize:[60,16],iconAnchor:[30,8]})}).addTo(g);
    g.addTo(map); ringLayers[z]=g;
  });
  L.marker([lat,lon]).addTo(map).bindPopup('<div class="pp"><b>AMA warehouse</b><br><span>7301 Dumas Dr, Amarillo TX 79108</span></div>');
  buildLegend();
}
function buildLegend(){
  const box=document.getElementById('rings'); box.innerHTML='';
  ZRING.forEach(([z,mi,clean,col])=>{
    const r=document.createElement('div');r.className='zr';r.id='lr'+z;
    r.innerHTML='<span class="sw" style="border-top-color:'+col+';'+
      (clean?'':'border-top-style:dashed;')+'"></span>Zone '+z+
      ' <span class="mi">'+mi+'mi'+(clean?'':' *')+'</span>'+
      '<span class="c">'+(ZCOUNT[z]||0)+'</span>';
    r.onclick=()=>ringToggle(z); box.appendChild(r);
  });
  const note=document.createElement('div');note.style.cssText='font-size:9px;color:var(--mut);margin-top:6px;line-height:1.4;';
  note.innerHTML='* H / I / Z overlap by distance (directional far clusters, not clean rings). Rings drawn straight-line from terminal; labels are the zone\u2019s drive-mile outer edge.';
  box.appendChild(note);
}
function ringToggle(z){const r=document.getElementById('lr'+z);if(!ringLayers[z])return;
  if(map.hasLayer(ringLayers[z])){map.removeLayer(ringLayers[z]);r.classList.add('off');}
  else{map.addLayer(ringLayers[z]);r.classList.remove('off');}}
let allOn=true;
document.getElementById('allrings').onclick=()=>{allOn=!allOn;
  ZRING.forEach(([z])=>{const r=document.getElementById('lr'+z);
    if(allOn){map.addLayer(ringLayers[z]);r&&r.classList.remove('off');}
    else{map.removeLayer(ringLayers[z]);r&&r.classList.add('off');}});};

function addMarker(p,lat,lon){
  const [zip,q,city,dist,zone]=p;
  const m=L.circleMarker([lat,lon],{radius:6,color:'#333',weight:1.2,
    fillColor:QCOL[q],fillOpacity:.92});
  m.bindPopup('<div class="pp"><b>'+zip+'</b> &mdash; <span>'+city+'</span><br>'+
    '<span>Distance: '+dist+' mi &middot; Zone '+zone+'</span><br>'+
    '<span class="tag '+(q?'red':'grn')+'">'+(q?'QUOTE ONLY':'SERVED')+'</span></div>');
  m.addTo(ptLayer); bounds.push([lat,lon]);
}
async function geocode(zip){
  try{const r=await fetch('https://api.zippopotam.us/us/'+zip);if(!r.ok)return null;
    const j=await r.json();const pl=j.places&&j.places[0];if(!pl)return null;
    return [parseFloat(pl.latitude),parseFloat(pl.longitude)];}catch(e){return null;}
}
function tick(){
  done++;const pct=Math.round(done/POINTS.length*100);
  document.getElementById('pct').textContent=pct+'%';
  document.querySelector('#bar>div').style.width=pct+'%';
  if(done===POINTS.length){
    if(bounds.length)map.fitBounds(bounds,{padding:[40,40]});
    document.getElementById('prog').innerHTML='Plotted '+bounds.length+' / '+POINTS.length+' zips';
  }
}
async function worker(q){while(q.length){const p=q.shift();const c=await geocode(p[0]);
  if(c)addMarker(p,c[0],c[1]);tick();}}
(function(){buildRings(WAREHOUSE[0],WAREHOUSE[1]);
  const q=POINTS.slice();
  for(let i=0;i<8;i++)worker(q);})();
</script>
